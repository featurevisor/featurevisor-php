name: Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Static analysis
        run: composer sast

      - name: Unit tests
        run: composer test

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Setup Featurevisor example-1 project
        run: |
          mkdir example-1
          (cd example-1 && npx --yes @featurevisor/cli@3 init --example=1)
          (cd example-1 && npm install)
          (cd example-1 && npx featurevisor build)
          (cd example-1 && npx featurevisor test --onlyFailures)

      - name: Run Featurevisor project tests against PHP SDK
        run: ./featurevisor test --projectDirectoryPath=./example-1 --onlyFailures
